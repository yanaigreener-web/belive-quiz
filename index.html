<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="פריצת דרך רפואית מקנדה לעצירת נשירה והצמחת שיער. באישור משרד הבריאות. ערבות 90 יום.">
<title>BeLive Hair — פריצת דרך רפואית לשיער מלא</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ==== RESET & BASE ==== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

:root {
  --bg: #F2EBE0;
  --bg-grid: rgba(31,82,52,0.06);
  --paper: #FFFF;
  --ink: #0A0A0A;
  --ink-soft: #4A4A4A;
  --green: #1F5234;
  --green-deep: #14391F;
  --mint: #4FC3B5;
  --mint-soft: #C9EBE5;
  --radius: 14px;
  --radius-sm: 10px;
  --border: 2.5px solid var(--ink);
  --maxw: 540px;
  --shadow-lg: 8px 8px 0 0 var(--ink);
  --shadow-md: 5px 5px 0 0 var(--ink);
}

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
  background-size: 32px 32px;
  color: var(--ink);
  padding-bottom: 90px;
}

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 18px; }

/* ==== HEADER & HERO ==== */
.top-banner { background: var(--green); color: #fff; text-align: center; padding: 10px; font-size: 14px; border-bottom: 2.5px solid var(--ink); }
.header { padding: 18px 0; text-align: center; }
.logo { font-family: 'Rubik', sans-serif; font-weight: 900; font-size: 26px; color: var(--green); }

.hero { padding: 26px 0; text-align: center; }
.hero h1 { font-size: 34px; margin-bottom: 16px; font-family: 'Rubik', sans-serif; font-weight: 800; }
.hero h1 .hl { background: var(--mint); padding: 0 8px; border-radius: 6px; display: inline-block; border: 2px solid var(--ink); transform: rotate(-1deg); }

/* ==== QUIZ UI COMPONENTS ==== */
.btn { display: block; width: 100%; padding: 18px; border-radius: var(--radius); font-family: 'Rubik', sans-serif; font-weight: 700; font-size: 18px; text-decoration: none; text-align: center; border: var(--border); transition: 0.1s; cursor: pointer; }
.btn-primary { background: var(--green); color: #fff; box-shadow: var(--shadow-md); }
.btn-primary:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 0 var(--ink); }

.quiz-option { display: flex; align-items: center; gap: 12px; width: 100%; padding: 14px; border: 2px solid var(--ink); border-radius: var(--radius-sm); background: var(--paper); margin-bottom: 10px; cursor: pointer; text-align: right; box-shadow: 2px 2px 0 0 var(--ink); font-weight: 600; }
.quiz-option.multi-selected { background: var(--mint-soft); border-color: var(--green); }
.quiz-check { width: 22px; height: 22px; border: 2px solid var(--ink); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: white; }
.multi-selected .quiz-check { background: var(--green); color: white; }

/* Visual Scale / Norwood */
.norwood-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
.nw-item { border: 2px solid var(--ink); border-radius: 8px; padding: 6px; cursor: pointer; text-align: center; background: white; box-shadow: 2px 2px 0 0 var(--ink); transition: 0.2s; }
.nw-item.selected { background: var(--mint-soft); border-color: var(--green); transform: scale(0.98); }
.nw-item img { width: 100%; height: auto; border-radius: 4px; display: block; margin-bottom: 4px; }
.nw-item span { font-size: 11px; font-weight: 800; display: block; }

.additional-options { border-top: 1px solid #dcd3c5; padding-top: 15px; margin-top: 15px; }
.quiz-back { display: block; width: fit-content; margin: 15px auto 0; background: none; border: none; text-decoration: underline; color: var(--ink-soft); cursor: pointer; }

/* Modal */
.quiz-modal { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
.quiz-modal.open { display: flex; }
.quiz-modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
.quiz-modal-card { position: relative; background: var(--paper); border: var(--border); border-radius: var(--radius); padding: 25px 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
</style>
</head>
<body>

<div class="top-banner">🎁 <strong>הטבת השקה:</strong> עד 20% הנחה לזמן מוגבל</div>

<header class="header"><div class="wrap"><div class="logo">BeLive Hair</div></div></header>

<section class="hero">
  <div class="wrap">
    <h1>אם אתה בשלב <span class="hl">1 עד 4</span> <br>אתה לא צריך השתלה.</h1>
    <div style="margin-top:25px;">
        <button class="btn btn-primary" onclick="openQuiz()">התחל אבחון דיגיטלי חינם</button>
    </div>
  </div>
</section>

<!-- Modal Quiz -->
<div id="quizModal" class="quiz-modal">
  <div class="quiz-modal-overlay" onclick="closeQuiz()"></div>
  <div class="quiz-modal-card">
    <div id="quizCard"></div>
  </div>
</div>

<!-- Inline Quiz -->
<section id="quiz" class="wrap" style="margin-top:40px;">
    <div id="quizContainer" style="background:white; padding:20px; border:var(--border); border-radius:var(--radius);"></div>
</section>

<script>
// חילקתי את התמונה שהעלית ל-8 חלקים (קואורדינטות לפי התמונה המלאה)
const NW_IMAGES = [
  "https://api.screenshotone.com/take?url=about%3Ablank&block_ads=true&block_cookie_banners=true&block_trackers=true&delay=0&format=jpg&image_quality=80&width=150&height=150&url=https%3A%2F%2Fstorage.googleapis.com%2Fabacus-ai-file-uploads%2FIMG_20260508_150014_stage1.png", // אלו קישורי תמונה לדוגמה, במציאות נשתמש ב-Crops
  // לצורך הקוד, נשתמש בנתיב המלא של התמונה עם CSS object-position כדי להציג כל חלק
];

// יצרתי פונקציה שמייצרת את התמונות הגזורות מהתמונה הגדולה שלך
function getStageStyle(index) {
    const rows = 2; const cols = 4;
    const r = Math.floor(index / cols);
    const c = index % cols;
    return `background-image: url('https://files.abacus.ai/api/v1/file/get_content?file_id=צילום%20מסך%202026-05-08%20150014.png'); 
            background-size: 400% 200%; 
            background-position: ${c * 33.33}% ${r * 100}%; 
            width: 100%; height: 80px; background-repeat: no-repeat; margin-bottom:5px; border-radius:4px;`;
}

const QUESTIONS = [
  {
    id: 'stage',
    question: "באיזה שלב היית מאפיין את השיער שלך?",
    sub: "בחר את התמונה הכי קרובה למצבך",
    type: 'visual',
    options: [
      { text: "שלב 1", val: "1" }, { text: "שלב 2", val: "2" }, { text: "שלב 3", val: "3" }, { text: "שלב 3-V", val: "3v" },
      { text: "שלב 4", val: "4" }, { text: "שלב 5", val: "5" }, { text: "שלב 6", val: "6" }, { text: "שלב 7", val: "7" }
    ]
  },
  {
    id: 'priority',
    question: "מה הכי חשוב לך בטיפול?",
    sub: "ניתן לבחור כמה אפשרויות",
    type: 'multi',
    options: [
      { text: "תוצאות מהירות", val: "speed" },
      { text: "יעילות רפואית", val: "science" },
      { text: "ליווי צמוד", val: "support" },
      { text: "בלי תופעות לוואי", val: "safety" }
    ]
  }
];

let currentStep = 0;
let answers = { stage: null, priority: [], thinning: [] };
let activeContainer = "quizContainer";

function renderQuiz() {
  const container = document.getElementById(activeContainer);
  const q = QUESTIONS[currentStep];
  
  let html = `<h3 style="font-family:Rubik; font-size:22px; margin-bottom:5px;">${q.question}</h3>`;
  if (q.sub) html += `<p style="color:var(--ink-soft); margin-bottom:15px; font-size:14px;">${q.sub}</p>`;

  if (q.type === 'visual') {
    html += `<div class="norwood-selector">`;
    q.options.forEach((opt, idx) => {
      html += `
        <div class="nw-item ${answers.stage === opt.val ? 'selected' : ''}" onclick="setStage('${opt.val}')">
          <div style="${getStageStyle(idx)}"></div>
          <span>${opt.text}</span>
        </div>`;
    });
    html += `</div>`;
    
    html += `
      <div class="additional-options">
        <div class="quiz-option ${answers.thinning.includes('very-thin') ? 'multi-selected' : ''}" onclick="toggleThinning('very-thin')">
            <div class="quiz-check">✓</div> גם השיער שלי דליל נורא
        </div>
        <div class="quiz-option ${answers.thinning.includes('only-thin') ? 'multi-selected' : ''}" onclick="toggleThinning('only-thin')">
            <div class="quiz-check">✓</div> השיער רק דליל בלי הקרחות
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:15px;" onclick="nextStep()">המשך</button>`;
  } 
  
  else if (q.type === 'multi') {
    html += `<div style="margin-bottom:20px;">`;
    q.options.forEach(opt => {
      html += `
        <div class="quiz-option ${answers.priority.includes(opt.val) ? 'multi-selected' : ''}" onclick="togglePriority('${opt.val}')">
            <div class="quiz-check">✓</div> ${opt.text}
        </div>`;
    });
    html += `</div>
    <button class="btn btn-primary" onclick="finishQuiz()">סיום וקבלת תוצאה</button>`;
  }

  if (currentStep > 0) html += `<button class="quiz-back" onclick="prevStep()">חזור</button>`;
  container.innerHTML = html;
}

function setStage(val) { answers.stage = val; renderQuiz(); }
function toggleThinning(val) {
    const i = answers.thinning.indexOf(val);
    if (i > -1) answers.thinning.splice(i, 1); else answers.thinning.push(val);
    renderQuiz();
}
function togglePriority(val) {
    const i = answers.priority.indexOf(val);
    if (i > -1) answers.priority.splice(i, 1); else answers.priority.push(val);
    renderQuiz();
}

function nextStep() { if (currentStep < QUESTIONS.length - 1) { currentStep++; renderQuiz(); } }
function prevStep() { if (currentStep > 0) { currentStep--; renderQuiz(); } }

function openQuiz() { activeContainer = "quizCard"; document.getElementById('quizModal').classList.add('open'); renderQuiz(); }
function closeQuiz() { document.getElementById('quizModal').classList.remove('open'); }

function finishQuiz() {
    const container = document.getElementById(activeContainer);
    container.innerHTML = `<div style="text-align:center; padding:20px;">
        <div style="font-size:40px; margin-bottom:15px;">🎉</div>
        <h3>האבחון הושלם!</h3>
        <p>נמצאה התאמה לטיפול. יועץ יחזור אליך בקרוב.</p>
        <button class="btn btn-primary" style="margin-top:20px;" onclick="location.reload()">חזור לדף הבית</button>
    </div>`;
}

window.onload = renderQuiz;
</script>
</body>
</html>
