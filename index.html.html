<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belive Hair - גלה איזה טיפול מתאים לך</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(170deg, #f4f8f6 0%, #eaf0ed 50%, #e2ebe7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Heebo', sans-serif;
    direction: rtl;
  }
  .card {
    background: #fff;
    border-radius: 22px;
    padding: 36px 28px 28px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 2px 32px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.03);
    opacity: 0;
    animation: fadeUp 0.45s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .brand-bar {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid #f0f2f1;
  }
  .brand-name {
    font-family: 'Montserrat', 'Heebo', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 1.5px;
    color: #1a4d3c;
  }
  .brand-sub { font-size: 12px; color: #999; }

  /* Welcome */
  .welcome-logo-wrap { text-align: center; margin-bottom: 20px; padding-top: 12px; }
  .welcome-logo { font-family: 'Montserrat', 'Heebo', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: 2px; color: #1a4d3c; }
  .welcome-clinic { font-size: 13px; color: #999; margin-top: 4px; }
  .welcome-divider { width: 40px; height: 3px; background: linear-gradient(90deg, #1a6b52, #34c48b); border-radius: 3px; margin: 0 auto 28px; }
  .welcome-title { font-size: 24px; font-weight: 800; color: #1a1a1a; text-align: center; line-height: 1.4; margin-bottom: 14px; }
  .welcome-desc { font-size: 15px; color: #666; text-align: center; line-height: 1.7; margin-bottom: 32px; padding: 0 8px; }

  /* Buttons */
  .start-btn, .continue-btn, .cta-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #1a4d3c, #1a6b52);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
    box-shadow: 0 4px 16px rgba(26,77,60,0.2);
  }
  .start-btn:hover, .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(26,77,60,0.3); }
  .cta-btn { font-size: 17px; font-weight: 800; margin-top: 16px; margin-bottom: 10px; box-shadow: 0 4px 20px rgba(26,77,60,0.25); }
  .cta-btn:hover { transform: scale(1.03); box-shadow: 0 8px 30px rgba(26,77,60,0.35); }
  .continue-btn { margin-top: 16px; font-size: 16px; border-radius: 12px; padding: 14px; }
  .continue-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .trust { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11.5px; color: #bbb; margin-top: 12px; }

  /* Progress */
  .step-count { font-size: 13px; color: #aaa; font-weight: 500; text-align: left; margin-bottom: 14px; }
  .progress-track { width: 100%; height: 4px; background: #edf1ef; border-radius: 4px; margin-bottom: 30px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #1a4d3c, #28a37a); border-radius: 4px; transition: width 0.5s ease; }

  /* Question */
  .question-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; line-height: 1.45; }
  .question-sub { font-size: 13.5px; color: #999; margin-bottom: 22px; line-height: 1.5; }
  .options { display: flex; flex-direction: column; gap: 9px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid #e2e7e4;
    border-radius: 12px;
    background: #fff;
    font-size: 15px;
    font-weight: 500;
    color: #333;
    cursor: pointer;
    text-align: right;
    transition: all 0.18s ease;
    font-family: inherit;
    direction: rtl;
  }
  .option-btn:hover { border-color: #1a6b52; background: #f6fbf9; }
  .option-btn.selected { border-color: #1a6b52; background: #f0faf6; }
  .checkbox-icon {
    width: 21px; height: 21px; border-radius: 6px; border: 2px solid #ccc;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; transition: all 0.18s ease; color: #fff;
  }
  .checkbox-icon.active { background: #1a6b52; border-color: #1a6b52; }

  /* Disqualify */
  .dq-icon { font-size: 44px; text-align: center; margin-bottom: 14px; }
  .dq-title { font-size: 21px; font-weight: 700; color: #1a1a1a; text-align: center; margin-bottom: 10px; line-height: 1.4; }
  .dq-body { font-size: 14.5px; color: #666; text-align: center; line-height: 1.7; margin-bottom: 26px; }
  .dq-email-box { background: #f7faf9; border-radius: 14px; padding: 18px; }
  .dq-email-text { font-size: 13.5px; color: #555; text-align: center; margin-bottom: 12px; }
  .email-row { display: flex; gap: 8px; }
  .email-input { flex: 1; padding: 11px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; font-family: inherit; direction: rtl; outline: none; }
  .email-btn { padding: 11px 18px; background: #1a4d3c; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

  /* Result */
  .result-badge { display: inline-flex; align-items: center; gap: 8px; background: #f0faf6; padding: 7px 14px; border-radius: 20px; font-size: 13.5px; font-weight: 600; color: #1a6b52; margin-bottom: 18px; }
  .badge-icon { background: #1a6b52; color: #fff; width: 19px; height: 19px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; }
  .result-headline { font-size: 22px; font-weight: 800; color: #1a1a1a; line-height: 1.45; margin-bottom: 22px; }
  .match-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; padding: 14px 16px; background: #fafcfb; border-radius: 12px; border: 1px solid #f0f2f1; }
  .match-label { font-size: 14px; font-weight: 600; color: #555; white-space: nowrap; }
  .match-track { flex: 1; height: 7px; background: #e8eeeb; border-radius: 7px; overflow: hidden; }
  .match-fill { height: 100%; background: linear-gradient(90deg, #28a37a, #1a4d3c); border-radius: 7px; transition: width 1s ease; }
  .match-value { font-size: 14px; font-weight: 700; color: #1a6b52; white-space: nowrap; }
  .result-text { font-size: 15px; color: #444; line-height: 1.75; margin-bottom: 12px; }
  .guarantee { text-align: center; font-size: 12.5px; color: #aaa; margin-top: 4px; }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="card" id="app"></div>

<script>
const PRODUCT_URL = "https://belive-hair.com/products/%D7%9E%D7%95%D7%A6%D7%A8-%D7%9C%D7%93%D7%95%D7%92%D7%9E%D7%94-copy";

const QUESTIONS = [
  { id:"age", question:"בן כמה אתה?", subtitle:"נשאל כדי לוודא שהמוצר מתאים לך", multi:false, options:[
    {label:"מתחת ל-18",value:"under18",disqualify:true},
    {label:"18-25",value:"18-25"},{label:"26-35",value:"26-35"},{label:"36-45",value:"36-45"},{label:"46+",value:"46+"}
  ]},
  { id:"situation", question:"מה המצב שלך היום?", subtitle:"בחר את מה שהכי מתאר אותך", multi:false, options:[
    {label:"רק התחלתי לשים לב לדלילות",value:"early",score:3},
    {label:"נסיגה בקו השיער",value:"receding",score:3},
    {label:"שיער דליל באזור הקודקוד",value:"thinning_crown",score:2},
    {label:"כמעט קרחת",value:"almost_bald",score:1},
    {label:"קרחת חלקה לחלוטין, אין שיער באזור",value:"fully_bald",disqualify:true}
  ]},
  { id:"duration", question:"מתי התחלת לשים לב לשינוי?", subtitle:"", multi:false, options:[
    {label:"בחודשים האחרונים",value:"recent",score:3},
    {label:"שנה עד שנתיים",value:"1-2years",score:3},
    {label:"3-5 שנים",value:"3-5years",score:2},
    {label:"מעל 5 שנים",value:"5+years",score:1},
    {label:"לא בטוח",value:"unsure",score:2}
  ]},
  { id:"tried", question:"ניסית משהו בעבר?", subtitle:"אפשר לבחור יותר מאחד", multi:true, options:[
    {label:"מינוקסידיל (רוגיין)",value:"minoxidil"},
    {label:"פינסטריד (פרופשיה) בכדורים",value:"finasteride"},
    {label:"תוספי תזונה / ויטמינים",value:"supplements"},
    {label:"שמפו טיפולי",value:"shampoo"},
    {label:"לא ניסיתי כלום",value:"nothing"}
  ]},
  { id:"concern", question:"מה הכי מפריע לך בנושא?", subtitle:"", multi:false, options:[
    {label:"ביטחון עצמי ודימוי",value:"confidence"},
    {label:"מראה מבוגר מהגיל",value:"aging"},
    {label:"תגובות מהסביבה",value:"social"},
    {label:"פשוט רוצה לטפל בזה",value:"proactive"}
  ]},
  { id:"allergy", question:"האם יש לך רגישות ידועה למינוקסידיל או לפינסטריד?", subtitle:"חשוב לנו לוודא שהמוצר בטוח עבורך", multi:false, options:[
    {label:"לא, אין לי רגישות",value:"no"},
    {label:"כן, יש לי רגישות",value:"yes",disqualify:true},
    {label:"לא בטוח",value:"unsure"}
  ]}
];

const DQ = {
  under18:{title:"המוצר מיועד לגילאי 18+",body:"הפורמולה שלנו מכילה מרכיבים פעילים שמאושרים לשימוש מגיל 18 ומעלה. מומלץ להתייעץ עם רופא עור.",icon:"🔒"},
  fully_bald:{title:"המצב שלך דורש פתרון אחר",body:"במצב של קרחת חלקה לחלוטין, הסיכוי לצמיחה מחדש נמוך. אנחנו ממליצים לפנות למומחה להשתלת שיער — זה הפתרון שיתן לך את התוצאה הטובה ביותר.",icon:"💬"},
  yes:{title:"בטיחות קודמת להכל",body:"אם יש לך רגישות ידועה למינוקסידיל או לפינסטריד, חשוב להתייעץ עם רופא לפני שימוש. נשמח לעזור לך למצוא פתרון מתאים.",icon:"⚕️"}
};

let step = -1;
let answers = {};
let multiSelect = [];
const app = document.getElementById("app");

function render(html) {
  app.style.opacity = 0;
  app.style.transform = "translateY(12px)";
  setTimeout(() => {
    app.innerHTML = html;
    app.style.transition = "opacity 0.4s ease, transform 0.4s ease";
    app.style.opacity = 1;
    app.style.transform = "translateY(0)";
  }, 80);
}

function showWelcome() {
  render(`
    <div class="welcome-logo-wrap">
      <div class="welcome-logo">Belive Hair</div>
      <div class="welcome-clinic">מבית Belive Clinics</div>
    </div>
    <div class="welcome-divider"></div>
    <h1 class="welcome-title">גלה איזה טיפול מתאים לך</h1>
    <p class="welcome-desc">שאלון קצר של דקה שיעזור לנו להבין את המצב שלך ולהתאים לך את הפתרון הטוב ביותר — בהתבסס על ניסיון של שנים בטיפולי נשירת שיער.</p>
    <button class="start-btn" onclick="startQuiz()">בוא נתחיל ←</button>
    <div class="trust"><span>🔒</span><span>המידע שלך לא נשמר ולא משותף</span></div>
  `);
}

function startQuiz() { step = 0; showQuestion(); }

function showQuestion() {
  const q = QUESTIONS[step];
  const progress = ((step) / QUESTIONS.length) * 100;
  multiSelect = [];

  let optionsHtml = q.options.map((opt, i) => {
    if (q.multi) {
      return `<button class="option-btn" id="opt${i}" onclick="toggleMulti(${i},'${opt.value}')">
        <span class="checkbox-icon" id="chk${i}"></span>${opt.label}</button>`;
    }
    return `<button class="option-btn" onclick="selectOption('${opt.value}',${opt.disqualify||false},${opt.score||0})">${opt.label}</button>`;
  }).join("");

  let continueBtn = q.multi ? `<button class="continue-btn" id="continueBtn" disabled onclick="submitMulti()">המשך →</button>` : "";

  render(`
    <div class="brand-bar"><span class="brand-name">Belive Hair</span><span class="brand-sub">מבית Belive Clinics</span></div>
    <div class="step-count">שאלה ${step+1} מתוך ${QUESTIONS.length}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    <h2 class="question-title">${q.question}</h2>
    ${q.subtitle ? `<p class="question-sub">${q.subtitle}</p>` : ""}
    <div class="options">${optionsHtml}</div>
    ${continueBtn}
    <div class="trust"><span>🔒</span><span>המידע שלך לא נשמר ולא משותף עם אף גורם חיצוני</span></div>
  `);
}

function selectOption(value, disqualify, score) {
  if (disqualify && DQ[value]) { showDisqualify(DQ[value]); return; }
  answers[QUESTIONS[step].id] = value;
  step++;
  if (step < QUESTIONS.length) showQuestion();
  else showResult();
}

function toggleMulti(index, value) {
  if (value === "nothing") {
    multiSelect = ["nothing"];
  } else {
    multiSelect = multiSelect.filter(v => v !== "nothing");
    if (multiSelect.includes(value)) multiSelect = multiSelect.filter(v => v !== value);
    else multiSelect.push(value);
  }
  // Update UI
  QUESTIONS[step].options.forEach((opt, i) => {
    const btn = document.getElementById("opt" + i);
    const chk = document.getElementById("chk" + i);
    if (multiSelect.includes(opt.value)) {
      btn.classList.add("selected");
      chk.classList.add("active");
      chk.textContent = "✓";
    } else {
      btn.classList.remove("selected");
      chk.classList.remove("active");
      chk.textContent = "";
    }
  });
  const cb = document.getElementById("continueBtn");
  if (cb) cb.disabled = multiSelect.length === 0;
}

function submitMulti() {
  if (multiSelect.length === 0) return;
  answers[QUESTIONS[step].id] = [...multiSelect];
  step++;
  if (step < QUESTIONS.length) showQuestion();
  else showResult();
}

function showDisqualify(dq) {
  render(`
    <div class="brand-bar"><span class="brand-name">Belive Hair</span><span class="brand-sub">מבית Belive Clinics</span></div>
    <div class="dq-icon">${dq.icon}</div>
    <h2 class="dq-title">${dq.title}</h2>
    <p class="dq-body">${dq.body}</p>
    <div class="dq-email-box">
      <p class="dq-email-text">רוצה שנעדכן אותך כשיהיה לנו פתרון שמתאים גם לך?</p>
      <div class="email-row">
        <input type="email" placeholder="כתובת מייל" class="email-input">
        <button class="email-btn">שלח</button>
      </div>
    </div>
  `);
}

function showResult() {
  let totalScore = 0;
  QUESTIONS.forEach(q => {
    if (q.multi) return;
    const sel = q.options.find(o => o.value === answers[q.id]);
    if (sel && sel.score) totalScore += sel.score;
  });

  const situation = answers.situation;
  const tried = answers.tried || [];
  const concern = answers.concern;

  let headline, match, matchWidth;

  if (totalScore >= 7) {
    headline = "אתה בדיוק בנקודה הנכונה לטפל בזה";
    match = "גבוה מאוד"; matchWidth = "95%";
  } else if (totalScore >= 4) {
    headline = "יש סיכוי טוב שהפורמולה שלנו תעבוד בשבילך";
    match = "גבוה"; matchWidth = "78%";
  } else {
    headline = "הפורמולה שלנו יכולה לעזור — עם ציפיות ריאליסטיות";
    match = "בינוני"; matchWidth = "55%";
  }

  const sitMap = {
    early: "שמת לב לשינוי מוקדם, וזה בדיוק הזמן לפעול — הזקיקים עדיין פעילים והסיכוי לתוצאות מהירות הוא הכי גבוה.",
    receding: "נסיגה בקו השיער מגיבה מצוין לטיפול כשמתחילים בזמן, ואתה בדיוק בנקודה הזו.",
    thinning_crown: "דלילות בקודקוד היא אחד האזורים שהכי מגיבים לטיפול מקומי, אז המצב שלך מתאים במיוחד.",
    almost_bald: "במצב מתקדם יותר, הטיפול יכול לעצור את ההתקרחות ולשפר צפיפות — אבל חשוב שתדע שזה דורש סבלנות ועקביות, והתוצאות ייקחו יותר זמן."
  };

  let triedKey = "other";
  if (tried.includes("minoxidil") || tried.includes("finasteride")) triedKey = "medical";
  else if (tried.includes("nothing")) triedKey = "nothing";

  const triedMap = {
    medical: "כבר ניסית טיפולים רפואיים בעבר, אז אתה יודע איך זה עובד. הפורמולה שלנו משלבת את שני המרכיבים הפעילים ביחד עם טכנולוגיית ספיגה מתקדמת — מה שיכול לתת תוצאות שלא קיבלת קודם.",
    nothing: "זה שלא ניסית כלום עד עכשיו זה דווקא יתרון — אתה מתחיל ישר עם הפתרון המתקדם ביותר.",
    other: "הפורמולה שלנו שונה לגמרי ממה שניסית — מדובר בפורמולה רפואית עם שני מרכיבים פעילים בספיגה ישירה לקרקפת."
  };

  const conMap = {
    confidence: "אנחנו שומעים את זה הרבה — שיער זה לא רק אסתטיקה, זה ביטחון עצמי. וזה בדיוק למה אנחנו כאן.",
    aging: "הרבה מהלקוחות שלנו אומרים שהדבר הראשון שאמרו להם זה שהם נראים צעירים יותר ובריאים יותר.",
    social: "אתה לא לבד בזה. המטרה — שתרגיש טוב עם עצמך בלי לחשוב על זה יותר.",
    proactive: "הגישה היזומה שלך זה בדיוק מה שצריך — ככל שמתחילים מוקדם יותר, התוצאות טובות יותר."
  };

  const bodyP1 = (sitMap[situation] || "") + " " + (triedMap[triedKey] || "");
  const bodyP2 = conMap[concern] || "";

  render(`
    <div class="brand-bar"><span class="brand-name">Belive Hair</span><span class="brand-sub">מבית Belive Clinics</span></div>
    <div class="result-badge"><span class="badge-icon">✓</span><span>התוצאות שלך</span></div>
    <h1 class="result-headline">${headline}</h1>
    <div class="match-bar">
      <div class="match-label">התאמה:</div>
      <div class="match-track"><div class="match-fill" id="matchFill" style="width:0%"></div></div>
      <div class="match-value">${match}</div>
    </div>
    <p class="result-text">${bodyP1}</p>
    <p class="result-text">${bodyP2}</p>
    <button class="cta-btn" onclick="window.open('${PRODUCT_URL}','_blank')">אני רוצה להתחיל טיפול →</button>
    <p class="guarantee">✦ 30 יום התנסות עם אחריות מלאה להחזר כספי</p>
  `);

  // Animate match bar
  setTimeout(() => {
    const fill = document.getElementById("matchFill");
    if (fill) fill.style.width = matchWidth;
  }, 300);
}

// Start
showWelcome();
</script>
</body>
</html>
